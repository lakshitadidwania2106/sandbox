<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Order Simulator</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .play-btn {
            background-color: #00c853;
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            padding: 20px 40px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 200, 83, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .play-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 200, 83, 0.6);
        }

        .play-btn:active {
            transform: scale(0.95);
        }

        #output {
            margin-top: 40px;
            width: 80%;
            max-width: 600px;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            border: 1px solid #333;
            min-height: 100px;
            font-size: 16px;
            line-height: 1.6;
            white-space: pre-wrap;
            display: none;
        }

        .loader {
            display: inline-block;
            margin-top: 20px;
            font-size: 18px;
            color: #aaa;
            display: none;
        }
        
        .security-badge {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 25px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .security-layers {
            margin-top: 15px;
            padding: 15px;
            background: #2a2a2a;
            border-radius: 8px;
            border-left: 4px solid #00c853;
            display: none;
        }
        
        .security-layers.show {
            display: block;
        }
        
        .layer-status {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            font-size: 14px;
        }
        
        .layer-status .status {
            font-weight: bold;
        }
        
        .layer-status .status.pass {
            color: #00c853;
        }
        
        .layer-status .status.blocked {
            color: #ff5252;
        }
        
        .layer-status .status.scrubbed {
            color: #ffc107;
        }
    </style>
</head>
<body>

    <div class="security-badge">
        🛡️ Bifrost Security: ACTIVE
    </div>

    <button class="play-btn" onclick="startSimulation()">
        ▶️ Simulate Amazon Order Flow
    </button>

    <div class="loader" id="loader">Running simulation... (Sending email & analyzing DB)</div>
    <div id="output"></div>
    <div class="security-layers" id="securityLayers"></div>

    <script>
        async function startSimulation() {
            const btn = document.querySelector('.play-btn');
            const loader = document.getElementById('loader');
            const output = document.getElementById('output');
            const securityLayers = document.getElementById('securityLayers');

            btn.disabled = true;
            btn.style.opacity = '0.5';
            loader.style.display = 'block';
            output.style.display = 'none';
            securityLayers.classList.remove('show');

            try {
                // Hardcoded email as requested
                const response = await fetch('/api/simulate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: "lakshita21lr@gmail.com" })
                });

                const data = await response.json();
                
                loader.style.display = 'none';
                output.style.display = 'block';

                if (data.error) {
                    output.innerHTML = `<span style="color: #ff5252">Error: ${data.error}</span>`;
                } else {
                    let formatted = data.response.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                    output.innerHTML = formatted;
                    
                    // Show security layers
                    if (data.security_layers) {
                        showSecurityLayers(data.security_layers);
                    }
                }
            } catch (err) {
                loader.style.display = 'none';
                output.style.display = 'block';
                output.innerHTML = `<span style="color: #ff5252">Connection Error: ${err.message}</span>`;
            } finally {
                btn.disabled = false;
                btn.style.opacity = '1';
            }
        }
        
        function showSecurityLayers(layers) {
            const container = document.getElementById('securityLayers');
            let html = '<div style="margin-bottom: 10px; font-weight: bold;">🛡️ Security Layers Status:</div>';
            
            const layerNames = {
                'lakera': 'Layer 1: Lakera Guard',
                'opa': 'Layer 2: OPA Policy',
                'presidio_input': 'Layer 3: Presidio Input'
            };
            
            for (const [key, name] of Object.entries(layerNames)) {
                if (layers[key]) {
                    const status = layers[key];
                    let statusClass = 'pass';
                    let statusIcon = '✅';
                    
                    if (status === 'BLOCKED') {
                        statusClass = 'blocked';
                        statusIcon = '🚫';
                    } else if (status.includes('SCRUBBED')) {
                        statusClass = 'scrubbed';
                        statusIcon = '🔒';
                    }
                    
                    html += `
                        <div class="layer-status">
                            <span>${statusIcon} ${name}</span>
                            <span class="status ${statusClass}">${status}</span>
                        </div>
                    `;
                }
            }
            
            container.innerHTML = html;
            container.classList.add('show');
        }
    </script>
</body>
</html>
